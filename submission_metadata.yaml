# ============================================================================
# AI tools declaration
# ============================================================================
# Transparency only — declared use is NOT penalized. Be honest. Stage 5 interview
# may verify these declarations against your code; declarations that contradict
# your code or your interview are flagged.

ai_tools_used:
  - "Claude"
  - "ChatGPT"       
  - "AmazonQ"  

ai_usage_summary: |
  Used Claude as a pair-programming assistant for architecture
  design, code generation, debugging, and methodology validation. Used AmazonQ
  for autocomplete during routine code writing.

  All algorithmic decisions (7-signal scoring architecture, weighted geometric
  mean fusion, importance-weighted skill matching, generic anomaly detection
  patterns, honeypot identification heuristics) were validated, refined, and
  integrated manually.

  No candidate data was sent to any LLM at any point. No LLM was called during
  ranking — the entire scoring pipeline is deterministic Python that runs
  offline on CPU. The submission CSV was generated by running the local
  pipeline, not by prompting an LLM.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================

methodology_summary: |
  Seven-signal scoring pipeline combining BGE-small semantic embeddings (via
  local Qdrant vector DB) with rule-based multi-signal scoring across semantic
  fit, importance-weighted skill match, Redrob behavioral signals, career
  trajectory, experience fit, profile quality, and structural anomaly
  detection.

  Skill importance is derived generically from JD text signals: position in
  document, mention frequency, and proximity to "must have" markers. No
  hardcoded role-specific lists. The same parser works for any JD (AI, HR,
  Civil Engineering, etc.).

  Scores are fused via weighted geometric mean, which requires balanced
  performance across dimensions and prevents gaming through specialization.

  Honeypot candidates are detected structurally through title-description
  mismatches, duplicate job descriptions, inflated proficiency claims (advanced
  skills with very short tenure), and experience-timeline inconsistencies.
  These patterns are universal — they catch fake profiles in any role family
  without role-specific tuning.

  Reasoning text is template-based from actual scored data, eliminating LLM
  hallucination risk. Runtime: 2-3 minutes for 100k candidates on CPU.

